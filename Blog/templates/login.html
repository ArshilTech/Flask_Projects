{% extends "layout.html" %}
{% block body %}

<style>
  /* Animated background with bouncy balls */
  .login-container {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #00bfa6 0%, #008e76 25%, #ffb347 50%, #5df2d6 75%, #ffe0b2 100%);
    background-size: 400% 400%;
    animation: gradient-shift 15s ease infinite;
    position: relative;
    overflow: hidden;
  }

  @keyframes gradient-shift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* Bouncy balls background */
  .bouncy-ball {
    position: absolute;
    border-radius: 50%;
    opacity: 0.15;
    animation: float 20s infinite ease-in-out;
  }

  .ball-1 {
    width: 120px;
    height: 120px;
    background: #00bfa6;
    top: 10%;
    left: 10%;
    animation: float-1 25s infinite ease-in-out;
  }

  .ball-2 {
    width: 90px;
    height: 90px;
    background: #ffb347;
    bottom: 20%;
    right: 10%;
    animation: float-2 30s infinite ease-in-out reverse;
  }

  .ball-3 {
    width: 150px;
    height: 150px;
    background: #5df2d6;
    top: 50%;
    left: 5%;
    animation: float-3 35s infinite ease-in-out;
  }

  .ball-4 {
    width: 100px;
    height: 100px;
    background: #008e76;
    bottom: 10%;
    left: 50%;
    animation: float-4 28s infinite ease-in-out reverse;
  }

  .ball-5 {
    width: 110px;
    height: 110px;
    background: #ffe0b2;
    top: 20%;
    right: 15%;
    animation: float-5 32s infinite ease-in-out;
  }

  .ball-6 {
    width: 85px;
    height: 85px;
    background: #e6932e;
    bottom: 30%;
    right: 30%;
    animation: float-6 26s infinite ease-in-out reverse;
  }

  .ball-7 {
    width: 95px;
    height: 95px;
    background: #00bfa6;
    top: 15%;
    left: 40%;
    animation: float-7 33s infinite ease-in-out;
  }

  .ball-8 {
    width: 75px;
    height: 75px;
    background: #ffb347;
    bottom: 15%;
    right: 50%;
    animation: float-8 24s infinite ease-in-out reverse;
  }

  @keyframes float-1 {
    0%, 100% { transform: translateY(0px) translateX(0px); }
    25% { transform: translateY(-80px) translateX(60px); }
    50% { transform: translateY(-150px) translateX(-40px); }
    75% { transform: translateY(-60px) translateX(80px); }
  }

  @keyframes float-2 {
    0%, 100% { transform: translateY(0px) translateX(0px); }
    25% { transform: translateY(-100px) translateX(-70px); }
    50% { transform: translateY(-180px) translateX(50px); }
    75% { transform: translateY(-90px) translateX(-60px); }
  }

  @keyframes float-3 {
    0%, 100% { transform: translateY(0px) translateX(0px); }
    25% { transform: translateY(-60px) translateX(50px); }
    50% { transform: translateY(-140px) translateX(-30px); }
    75% { transform: translateY(-75px) translateX(90px); }
  }

  @keyframes float-4 {
    0%, 100% { transform: translateY(0px) translateX(0px); }
    25% { transform: translateY(-90px) translateX(40px); }
    50% { transform: translateY(-160px) translateX(-60px); }
    75% { transform: translateY(-70px) translateX(70px); }
  }

  @keyframes float-5 {
    0%, 100% { transform: translateY(0px) translateX(0px); }
    25% { transform: translateY(-70px) translateX(-80px); }
    50% { transform: translateY(-170px) translateX(30px); }
    75% { transform: translateY(-85px) translateX(-50px); }
  }

  @keyframes float-6 {
    0%, 100% { transform: translateY(0px) translateX(0px); }
    25% { transform: translateY(-110px) translateX(50px); }
    50% { transform: translateY(-190px) translateX(-70px); }
    75% { transform: translateY(-100px) translateX(60px); }
  }

  @keyframes float-7 {
    0%, 100% { transform: translateY(0px) translateX(0px); }
    25% { transform: translateY(-80px) translateX(-60px); }
    50% { transform: translateY(-150px) translateX(40px); }
    75% { transform: translateY(-95px) translateX(-80px); }
  }

  @keyframes float-8 {
    0%, 100% { transform: translateY(0px) translateX(0px); }
    25% { transform: translateY(-120px) translateX(70px); }
    50% { transform: translateY(-200px) translateX(-50px); }
    75% { transform: translateY(-110px) translateX(90px); }
  }

  /* Particles */
  .particle {
    position: absolute;
    pointer-events: none;
  }

  .particle::before {
    content: '';
    display: block;
    width: 10px;
    height: 10px;
    background: radial-gradient(circle, #fff 0%, rgba(255,255,255,0) 70%);
    border-radius: 50%;
    animation: particle-float 8s infinite ease-out;
  }

  @keyframes particle-float {
    0% {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
    100% {
      opacity: 0;
      transform: translateY(-100px) scale(0);
    }
  }

  /* Login card */
  .login-card {
    background: rgba(255, 255, 255, 0.98);
    backdrop-filter: blur(20px);
    border-radius: 30px;
    padding: 35px 40px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    width: 100%;
    max-width: 380px;
    position: relative;
    z-index: 10;
    animation: card-slide-up 0.8s ease-out;
    border: 1px solid rgba(255, 255, 255, 0.7);
  }

  @keyframes card-slide-up {
    from {
      opacity: 0;
      transform: translateY(50px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* Logo */
  .login-logo {
    text-align: center;
    margin-bottom: 25px;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .logo-container {
    width: 100px;
    height: 100px;
    background: linear-gradient(135deg, #00bfa6 0%, #008e76 50%, #ffb347 100%);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 40px rgba(0, 191, 166, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.3);
    border: 4px solid rgba(255, 255, 255, 0.8);
    animation: logo-glow 3s ease-in-out infinite;
    position: relative;
  }

  .logo-container::before {
    content: '';
    position: absolute;
    width: 120px;
    height: 120px;
    border: 2px solid rgba(102, 126, 234, 0.3);
    border-radius: 50%;
    animation: logo-rotate 8s linear infinite reverse;
  }

  .login-logo img {
    width: 55px;
    height: 55px;
    filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.2));
    animation: logo-bounce 2s ease-in-out infinite;
    z-index: 2;
  }

  @keyframes logo-spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  @keyframes logo-rotate {
    from { transform: rotate(360deg); }
    to { transform: rotate(0deg); }
  }

  @keyframes logo-glow {
    0%, 100% { box-shadow: 0 0 40px rgba(102, 126, 234, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.3); }
    50% { box-shadow: 0 0 60px rgba(102, 126, 234, 0.8), inset 0 0 30px rgba(255, 255, 255, 0.5); }
  }

  @keyframes logo-bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  /* Title */
  .login-title {
    text-align: center;
    font-size: 2rem;
    font-weight: 800;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #00bfa6 0%, #008e76 50%, #ffb347 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .login-subtitle {
    text-align: center;
    color: #666;
    font-size: 0.85rem;
    margin-bottom: 30px;
    font-weight: 500;
  }

  /* Form styling */
  .login-form {
    display: flex;
    flex-direction: column;
    gap: 15px;
  }

  .form-group {
    position: relative;
  }

  .form-group label {
    display: block;
    font-weight: 600;
    color: #333;
    margin-bottom: 6px;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .form-control {
    width: 100%;
    padding: 12px 15px;
    border: 2px solid #e0e0e0;
    border-radius: 12px;
    font-size: 0.95rem;
    transition: all 0.3s ease;
    font-family: 'Inter', sans-serif;
  }

  .form-control:focus {
    outline: none;
    border-color: #00bfa6;
    box-shadow: 0 0 0 4px rgba(0, 191, 166, 0.1);
    transform: translateY(-2px);
  }

  .form-control::placeholder {
    color: #999;
  }

  /* Checkbox */
  .form-check {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: -8px;
  }

  .form-check-input {
    width: 18px;
    height: 18px;
    cursor: pointer;
    accent-color: #00bfa6;
    margin-top: 0;
    flex-shrink: 0;
  }

  .form-check-label {
    font-size: 0.8rem;
    color: #666;
    cursor: pointer;
    margin: 0;
    display: flex;
    align-items: center;
    line-height: 1.2;
  }

  /* Submit button */
  .btn-signin {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #00bfa6 0%, #ffb347 100%);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 0.9rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    margin-top: 8px;
  }

  .btn-signin::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    background: rgba(255, 255, 255, 0.2);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    transition: width 0.6s, height 0.6s;
  }

  .btn-signin:hover::before {
    width: 300px;
    height: 300px;
  }

  .btn-signin:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 40px rgba(0, 191, 166, 0.4);
  }

  .btn-signin:active {
    transform: translateY(-1px);
  }

  /* Error alert */
  .alert-error {
    background: linear-gradient(135deg, #ffb347 0%, #e6932e 100%);
    color: white;
    padding: 15px 20px;
    border-radius: 12px;
    margin-bottom: 25px;
    font-weight: 500;
    animation: shake 0.5s ease-in-out;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-10px); }
    75% { transform: translateX(10px); }
  }

  /* Footer text */
  .login-footer {
    text-align: center;
    margin-top: 20px;
    padding-top: 15px;
    border-top: 1px solid #e0e0e0;
    color: #999;
    font-size: 0.8rem;
  }

  .login-footer strong {
    color: #00bfa6;
    font-weight: 600;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .login-card {
      padding: 30px 30px;
      max-width: 90%;
      margin: 20px;
    }

    .login-title {
      font-size: 1.8rem;
    }

    .logo-container {
      width: 85px;
      height: 85px;
    }

    .logo-container::before {
      width: 105px;
      height: 105px;
    }

    .login-logo img {
      width: 48px;
      height: 48px;
    }

    .bouncy-ball {
      opacity: 0.08;
    }
  }
</style>

<div class="login-container">
  <!-- Animated bouncy balls -->
  <div class="bouncy-ball ball-1"></div>
  <div class="bouncy-ball ball-2"></div>
  <div class="bouncy-ball ball-3"></div>
  <div class="bouncy-ball ball-4"></div>
  <div class="bouncy-ball ball-5"></div>
  <div class="bouncy-ball ball-6"></div>
  <div class="bouncy-ball ball-7"></div>
  <div class="bouncy-ball ball-8"></div>

  <!-- Login card -->
  <div class="login-card">
    <!-- Logo -->
    <div class="login-logo">
      <div class="logo-container">
        <img src="{{ url_for('static', filename='assets/favicon.ico') }}" alt="Nexus Logo" />
      </div>
    </div>

    <!-- Title -->
    <h1 class="login-title">Nexus</h1>
    <p class="login-subtitle">Admin Portal</p>

    <!-- Error message -->
    {% if error %}
    <div class="alert-error">
      ⚠️ {{ error }}
    </div>
    {% endif %}

    <!-- Login form -->
    <form class="login-form" action="/dashboard" method="POST">
      <!-- Email field -->
      <div class="form-group">
        <label for="inputEmail">Email Address</label>
        <input 
          type="email" 
          class="form-control" 
          id="inputEmail" 
          name="email" 
          placeholder="Enter your email" 
          required 
          autofocus
        />
      </div>

      <!-- Password field -->
      <div class="form-group">
        <label for="inputPassword">Password</label>
        <input 
          type="password" 
          class="form-control" 
          id="inputPassword" 
          name="password" 
          placeholder="Enter your password" 
          required
        />
      </div>

      <!-- Remember me -->
      <div class="form-check">
        <input 
          class="form-check-input" 
          type="checkbox" 
          value="remember-me" 
          id="rememberMe"
        />
        <label class="form-check-label" for="rememberMe">
          Remember me on this device
        </label>
      </div>

      <!-- Submit button -->
      <button class="btn-signin" type="submit">Sign In</button>
    </form>

    <!-- Footer -->
    <div class="login-footer">
      <strong>© Nexus 2026</strong><br>
      Secure Admin Portal
    </div>
  </div>
</div>

{% endblock %}

{% block scripts %}
<script>
  // Add random particles floating effect
  function createParticles() {
    const container = document.querySelector('.login-container');
    
    for (let i = 0; i < 30; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.top = '100%';
      particle.style.animationDelay = Math.random() * 8 + 's';
      particle.style.animationDuration = (Math.random() * 4 + 4) + 's';
      
      container.appendChild(particle);
    }
  }

  // Initialize particles on page load
  document.addEventListener('DOMContentLoaded', createParticles);

  // Add interaction effect to form inputs
  document.querySelectorAll('.form-control').forEach(input => {
    input.addEventListener('focus', function() {
      this.parentElement.style.transform = 'scale(1.02)';
      this.parentElement.style.transition = 'transform 0.3s ease';
    });

    input.addEventListener('blur', function() {
      this.parentElement.style.transform = 'scale(1)';
    });
  });
</script>
{% endblock %}
